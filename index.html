<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!--Mando a llamar mi clase y le asigno valores-->
    <style>
        .rectangulo{
        height: 40px;
        width: 80px;
        background-color: black;
        border: 1px solid red;
        margin-bottom: 10px;

        }

        .circulo{
            height: 100px;
            width: 100px;
            border-radius: 100%;
            background-color: cyan;
            padding: 12px;

        }

        .cuadrado{
            height: 60px;
            width: 60px;
            background-color: green;
            position: relative;
            margin-top: 20px;
            margin-left: 20px;

        }

    </style>

</head>

<body>
    <!--<div style="height: 40px; background-color: #000; width: 40px;">-->

    <!--Defino una clase para usarla luego-->
    <div class="rectangulo"></div>

    <!--Anido un clase dentro de otra-->
    <div class="circulo">
        <div class="cuadrado">

        </div>
    </div>
    
</body>
</html>
